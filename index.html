<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="color-scheme" content="light">
    <title>Girls Mobile Carousel</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <main class="widget" aria-label="Models carousel">
      <h1 class="model-name" id="modelName"></h1>

      <section class="carousel" aria-roledescription="carousel" aria-label="Models">
        <div class="models-track" id="modelsTrack"></div>
      </section>

      <section class="details" aria-live="polite">
        <img class="stats-image" id="statsImage" alt="">
        <nav class="socials" id="socials" aria-label="Social links"></nav>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
